<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZ-lab | Full Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="board" id="board">

  <!-- COLUMN 1 : Home + Timeline -->
  <div class="col">
    <div class="card home-card" id="card-home"></div>
    <div class="card" id="card-timeline"></div>
  </div>

  <!-- COLUMN 2 : Project Edit + Effects -->
  <div class="col">
    <div class="card" id="card-projectedit"></div>
    <div class="card" id="card-effects"></div>
  </div>

  <!-- COLUMN 3 : Resolution + Text & Sticker -->
  <div class="col">
    <div class="card" id="card-resolution"></div>
    <div class="card" id="card-textsticker"></div>
  </div>

  <!-- COLUMN 4 : AI Tools + Audio -->
  <div class="col">
    <div class="card" id="card-aitools"></div>
    <div class="card" id="card-audio"></div>
  </div>

  <!-- COLUMN 5 : Filters + Export Options -->
  <div class="col">
    <div class="card" id="card-filters"></div>
    <div class="card" id="card-exportoptions"></div>
  </div>

  <!-- COLUMN 6 : Adjust + My Projects -->
  <div class="col">
    <div class="card" id="card-adjust"></div>
    <div class="card" id="card-myprojects"></div>
  </div>

</div>

<!-- FOOTER FEATURE BAR -->
<div class="footer-bar" id="footer-bar"></div>

<script src="icons.js"></script>
<script src="app.js"></script>
</body>
</html>
