<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZ-lab | AI Video Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

  <!-- STATUS BAR -->
  <div class="statusbar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="0.5" fill="currentColor"/><rect x="5" y="5" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="currentColor"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C11 2 13.5 3.2 15 5L13.5 6.8C12.3 5.4 10.3 4.5 8 4.5C5.7 4.5 3.7 5.4 2.5 6.8L1 5C2.5 3.2 5 2 8 2Z" fill="currentColor"/><circle cx="8" cy="9.5" r="1.5" fill="currentColor"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="currentColor" fill="none"/><rect x="2" y="2" width="15" height="8" rx="1.2" fill="currentColor"/><rect x="21.5" y="4" width="1.5" height="4" rx="0.7" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- HEADER / TOP BAR (dynamic) -->
  <div class="topbar" id="topbar"></div>

  <!-- MAIN SCREEN AREA -->
  <div class="screen" id="screen"></div>

  <!-- BOTTOM NAV -->
  <div class="bottomnav">
    <button class="navbtn active" data-panel="home">
      <svg viewBox="0 0 24 24"><path d="M4 11L12 4L20 11V20H14V14H10V20H4V11Z" fill="currentColor"/></svg>
      <span>Home</span>
    </button>
    <button class="navbtn" data-panel="projects">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2" fill="currentColor"/><path d="M3 6L5 3H10L12 6" stroke="currentColor" fill="none" stroke-width="1.6"/></svg>
      <span>Projects</span>
    </button>
    <button class="navbtn fab" data-panel="newproject">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="url(#g1)"/><path d="M12 7V17M7 12H17" stroke="white" stroke-width="2" stroke-linecap="round"/><defs><linearGradient id="g1" x1="0" y1="0" x2="24" y2="24"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#4f7cff"/></linearGradient></defs></svg>
    </button>
    <button class="navbtn" data-panel="templates">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor"/></svg>
      <span>Templates</span>
    </button>
    <button class="navbtn" data-panel="profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="currentColor"/><path d="M4 20C4 16 7.5 14 12 14C16.5 14 20 16 20 20" fill="currentColor"/></svg>
      <span>Profile</span>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
